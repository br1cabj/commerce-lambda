version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: ecommerce_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ecommerce_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/ecommerce
      - FRONTEND_URL=http://localhost:3000
      # Agrega aquí tus otras variables de entorno (.env) como:
      # - STRIPE_SECRET_KEY=tu_clave
      # - JWT_SECRET=tu_secreto
    depends_on:
      - mongodb
    networks:
      - ecommerce_network

  frontend:
    build:
      context: ./platform-frontend
      dockerfile: Dockerfile
    container_name: ecommerce_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_DEFAULT_TENANT=demo
    depends_on:
      - backend
    networks:
      - ecommerce_network

networks:
  ecommerce_network:
    driver: bridge

volumes:
  mongodb_data:
