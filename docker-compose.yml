
services:
  mongodb:
    image: mongo:6
    container_name: ecommerce_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ecommerce_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/ecommerce
      - FRONTEND_URL=http://localhost:3000
      - JWT_SECRET=development_default_jwt_secret_key
      # Add other credentials here as needed (Stripe, Cloudinary, etc.)
    depends_on:
      - mongodb
    networks:
      - ecommerce_network

  frontend:
    build:
      context: ./platform-frontend
      dockerfile: Dockerfile
    container_name: ecommerce_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
      - INTERNAL_API_URL=http://backend:3001/api
      - NEXT_PUBLIC_DEFAULT_TENANT=demo
    depends_on:
      - backend
    networks:
      - ecommerce_network

networks:
  ecommerce_network:
    driver: bridge

volumes:
  mongodb_data:
