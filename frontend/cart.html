<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tu Carrito | Onda Basquete</title>
</head>
<body class="d-flex flex-column min-vh-100">
    
    <nav class="navbar navbar-expand-lg custom-navbar shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/index.html">
        <img src="/logo.jpeg" alt="Logo" class="nav-logo me-2">
        <span class="logo-text">ONDA BASQUETE</span>
        </a>
        <div class="ms-auto">
        <a class="nav-link fw-bold text-dark" href="#">Carrito <span class="badge text-bg-warning" id="cart-count">0</span></a>
        </div>
    </div>
    </nav>

    <main class="container my-5 flex-grow-1">
    <h2 class="fw-bold mb-4">Tu Carrito de Compras</h2>

    <div class="row g-5">
        
        <div class="col-12 col-lg-8">
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <div id="cart-items-container">
            </div>
        </div>
        </div>

        <div class="col-12 col-lg-4">
        <div class="card border-0 shadow-sm rounded-4 p-4 bg-light position-sticky" style="top: 100px;">
            <h5 class="fw-bold mb-4">Resumen de la Orden</h5>
            
            <div class="d-flex justify-content-between mb-3">
            <span class="text-muted">Subtotal</span>
            <span class="fw-bold" id="summary-subtotal">$0</span>
            </div>
            
            <div class="d-flex justify-content-between mb-3 pb-3 border-bottom">
            <span class="text-muted">Envío</span>
            <span class="fw-bold text-success">A coordinar</span>
            </div>

            <div class="d-flex justify-content-between mb-4">
            <h5 class="fw-bold mb-0">Total</h5>
            <h5 class="fw-bold mb-0" id="summary-total">$0</h5>
            </div>

            <button class="btn btn-dark w-100 py-3 rounded-pill fw-bold" id="btn-checkout" disabled>
            Finalizar Compra
            </button>
            <a href="/index.html" class="btn btn-outline-secondary w-100 py-2 rounded-pill fw-bold mt-2">
            Seguir Comprando
            </a>
        </div>
        </div>

    </div>
    </main>

    <footer class="bg-dark text-white pt-5 pb-3 mt-auto border-top border-4" style="border-color: var(--accent-color) !important;">
    <div class="container">
        <div class="text-center small text-white-50">
        <p class="mb-0">&copy; 2026 Onda Basquete. Todos los derechos reservados.</p>
        </div>
    </div>
    </footer>

    <script type="module" src="/src/cart.js"></script>
</body>
</html>
