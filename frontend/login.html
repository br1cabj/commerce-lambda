<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ingresar | Onda Basquete</title>
</head>
<body>
    
    <main class="login-bg">
    <div class="container">
        <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            
            <div class="login-card">
            <div class="login-header">
                <img src="/logo.jpeg" alt="Logo Onda Basquete" class="nav-logo mb-2 shadow-sm">
                <h3 class="fw-bold mb-0 text-white">ONDA BASQUETE</h3>
                <p class="text-white-50 small mb-0">Tu pase VIP a la cancha</p>
            </div>
            
            <div class="card-body p-4 p-md-5">
                <form id="login-form" autocomplete="off">
                <div class="mb-4">
                    <label for="email" class="form-label fw-bold small text-muted text-uppercase">Correo Electrónico</label>
                    <input type="email" class="form-control form-control-lg custom-input" id="email" placeholder="nombre@ejemplo.com" autocomplete="off" required>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center">
                    <label for="password" class="form-label fw-bold small text-muted text-uppercase mb-0">Contraseña</label>
                    <a href="#" id="forgot-btn" class="text-decoration-none small hover-orange fw-bold" style="color: var(--accent-color);">¿Olvidaste tu contraseña?</a>
                    </div>
                    <input type="password" class="form-control form-control-lg custom-input mt-2" id="password" placeholder="••••••••" autocomplete="new-password" required>
                </div>
                
                <button type="submit" class="btn hero-btn w-100 btn-lg mb-3">Iniciar Sesión</button>
                
                <div class="text-center mb-3">
                    <span class="text-muted small">¿No tienes cuenta?</span>
                    <a href="/register.html" class="text-decoration-none fw-bold hover-orange" style="color: var(--primary-color);">Regístrate aquí</a>
                </div>

                <div class="text-center">
                    <a href="/index.html" class="text-decoration-none text-muted small hover-orange">← Volver a la tienda</a>
                </div>
                </form>
            </div>
            </div>

        </div>
        </div>
    </div>
    </main>

    <script type="module" src="/src/login.js"></script>
</body>
</html>
