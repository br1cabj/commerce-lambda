<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restablecer Contraseña | Onda Basquete</title>
</head>
<body>
    
    <main class="login-bg py-5">
    <div class="container">
        <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            
            <div class="login-card">
            <div class="login-header">
                <img src="/logo.jpeg" alt="Logo Onda Basquete" class="nav-logo mb-2 shadow-sm">
                <h3 class="fw-bold mb-0 text-white">NUEVA CONTRASEÑA</h3>
                <p class="text-white-50 small mb-0">Crea una clave segura para tu cuenta</p>
            </div>
            
            <div class="card-body p-4 p-md-5">
                <form id="reset-form" autocomplete="off">
                
                <div class="mb-3">
                    <label for="new-password" class="form-label fw-bold small text-muted text-uppercase">Nueva Contraseña</label>
                    <input type="password" class="form-control custom-input" id="new-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required>
                </div>

                <div class="mb-4">
                    <label for="confirm-password" class="form-label fw-bold small text-muted text-uppercase">Confirmar Contraseña</label>
                    <input type="password" class="form-control custom-input" id="confirm-password" placeholder="Repite tu nueva contraseña" autocomplete="new-password" required>
                </div>
                
                <button type="submit" class="btn hero-btn w-100 btn-lg mb-3">Guardar Contraseña</button>
                
                <div class="text-center">
                    <a href="/login.html" class="text-decoration-none text-muted small hover-orange">← Cancelar y volver al Login</a>
                </div>
                </form>
            </div>
            </div>

        </div>
        </div>
    </div>
    </main>

    <script type="module" src="/src/reset-password.js"></script>
</body>
</html>
