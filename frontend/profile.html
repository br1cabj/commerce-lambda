<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Perfil | Onda Basquete</title>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg custom-navbar shadow-sm sticky-top bg-white">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/index.html">
                <img src="/logo.jpeg" alt="Logo" class="nav-logo me-2">
                <span class="logo-text">ONDA BASQUETE</span>
            </a>
            <div class="ms-auto d-flex align-items-center">
                <a class="nav-link fw-bold text-dark me-3" href="/index.html">Ir a la tienda</a>
                <button class="btn btn-outline-danger btn-sm fw-bold rounded-pill" id="btn-logout">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="row g-4">
            
            <div class="col-12 col-md-4">
                <div class="card border-0 shadow-sm rounded-4 p-4 text-center mb-4 border-top border-warning border-4">
                    <div class="bg-dark text-white rounded-circle d-inline-flex justify-content-center align-items-center mx-auto mb-3" style="width: 80px; height: 80px; font-size: 2rem;" id="profile-initial">
                        -
                    </div>
                    <h5 class="fw-bold mb-1" id="profile-name">Cargando...</h5>
                    <p class="text-muted small mb-3" id="profile-email">---</p>
                    <hr>
                    <h6 class="fw-bold text-uppercase mb-2" style="color: var(--accent-color);">Onda Basquete Club</h6>
                    <h2 class="fw-bold mb-0" id="profile-points">0</h2>
                    <p class="text-muted small">Puntos acumulados</p>
                </div>
            </div>

            <div class="col-12 col-md-8">
                <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
                    <h5 class="fw-bold mb-4 border-bottom pb-2">Mi Historial de Compras</h5>
                    <div id="orders-container">
                        <div class="text-center py-4">
                            <div class="spinner-border text-warning" role="status"></div>
                            <p class="text-muted mt-2 small">Cargando tus pedidos...</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-dark text-white pt-4 pb-3 mt-auto border-top border-4" style="border-color: var(--accent-color) !important;">
        <div class="container text-center small text-white-50">
            <p class="mb-0">&copy; 2026 Onda Basquete. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script type="module" src="/src/profile.js"></script>
</body>
</html>
