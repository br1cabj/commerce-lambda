<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro | Onda Basquete</title>
</head>
<body>
    
    <main class="login-bg py-5">
    <div class="container">
        <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            
            <div class="login-card">
            <div class="login-header">
                <img src="/logo.jpeg" alt="Logo Onda Basquete" class="nav-logo mb-2 shadow-sm">
                <h3 class="fw-bold mb-0 text-white">ÚNETE AL CLUB</h3>
                <p class="text-white-50 small mb-0">Crea tu cuenta y suma puntos</p>
            </div>
            
            <div class="card-body p-4 p-md-5">
                <form id="register-form" autocomplete="off">
                
                <div class="mb-3">
                    <label for="name" class="form-label fw-bold small text-muted text-uppercase">Nombre Completo</label>
                    <input type="text" class="form-control custom-input" id="name" placeholder="Ej. Manu Ginóbili" autocomplete="off" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label fw-bold small text-muted text-uppercase">Correo Electrónico</label>
                    <input type="email" class="form-control custom-input" id="email" placeholder="nombre@ejemplo.com" autocomplete="off" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label fw-bold small text-muted text-uppercase">Contraseña</label>
                    <input type="password" class="form-control custom-input" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required>
                </div>

                <div class="mb-4">
                    <label for="confirm-password" class="form-label fw-bold small text-muted text-uppercase">Confirmar Contraseña</label>
                    <input type="password" class="form-control custom-input" id="confirm-password" placeholder="Repite tu contraseña" autocomplete="new-password" required>
                </div>
                
                <button type="submit" class="btn hero-btn w-100 btn-lg mb-3">Crear Cuenta</button>
                
                <div class="text-center mb-3">
                    <span class="text-muted small">¿Ya tienes cuenta?</span>
                    <a href="/login.html" class="text-decoration-none fw-bold hover-orange" style="color: var(--primary-color);">Inicia sesión aquí</a>
                </div>

                <div class="text-center">
                    <a href="/index.html" class="text-decoration-none text-muted small hover-orange">← Volver a la tienda</a>
                </div>
                </form>
            </div>
            </div>

        </div>
        </div>
</div>
    </main>

    <script type="module" src="/src/register.js"></script>
</body>
</html>
